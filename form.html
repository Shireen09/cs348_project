<!DOCTYPE html>
<html>
<head>
    <title>Country Form</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }
        
        table {
            border-collapse: collapse;
            width: 70%;
        }
        
        th {
            background-color: #333;

<br>
<a href="/">⬅ Back to list</a>

</body>
</html>
